<script>
    const videoInput = document.getElementById('videoInput');
    const resultText = document.getElementById('resultText');
    const apiModal = document.getElementById('apiModal');
    const apiInput = document.getElementById('apiInput');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');

    async function checkAndConvert() {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (!savedKey) {
            apiModal.style.display = 'block';
        } else {
            startTranscription(savedKey);
        }
    }

    function saveApiKey() {
        const key = apiInput.value.trim();
        if (key) {
            localStorage.setItem('gemini_api_key', key);
            apiModal.style.display = 'none';
            alert("API Key Saved!");
        }
    }

    function removeApiKey() {
        localStorage.removeItem('gemini_api_key');
        alert("API Key Removed!");
    }

    function closeModal() { apiModal.style.display = 'none'; }

    async function startTranscription(apiKey) {
        const videoFile = videoInput.files[0];
        if (!videoFile) return alert("Please select a video first!");

        // ফাইল সাইজ চেক (Gemini inline_data সাধারণত ২০ এমবি পর্যন্ত ভালো কাজ করে)
        if (videoFile.size > 20 * 1024 * 1024) {
             resultText.innerText = "Error: ভিডিওটি ২০ এমবির চেয়ে বড়। ছোট ভিডিও ট্রাই করুন।";
             return;
        }

        loader.style.display = "inline-block";
        btnText.innerText = "Processing...";
        resultText.innerText = "AI analyzing video... please wait.";

        try {
            const base64Data = await toBase64(videoFile);
            const base64Content = base64Data.split(',')[1];

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Transcribe the audio from this video and provide the text subtitles clearly." },
                            { inline_data: { mime_type: videoFile.type || "video/mp4", data: base64Content } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            
            // এরর ডিবাগিং: কনসোলে পুরো রেসপন্স দেখাবে
            console.log("API Response:", data);

            if (data.error) {
                resultText.innerText = "Error: " + data.error.message;
            } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                resultText.innerText = data.candidates[0].content.parts[0].text;
            } else {
                resultText.innerText = "কোনো লেখা খুঁজে পাওয়া যায়নি। ভিডিওতে আওয়াজ আছে কি না নিশ্চিত করুন।";
            }
        } catch (error) {
            console.error(error);
            resultText.innerText = "Connection error! ইন্টারন্টে বা API Key চেক করুন।";
        } finally {
            loader.style.display = "none";
            btnText.innerText = "Convert";
        }
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    document.getElementById('drop-zone').onclick = () => videoInput.click();
    videoInput.onchange = () => {
        if(videoInput.files[0]) document.getElementById('fileName').innerText = "Selected: " + videoInput.files[0].name;
    };
</script>
