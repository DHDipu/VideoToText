<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link to Text Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            color: #5d66b0;
            margin-bottom: 20px;
        }
        .input-group {
            border: 4px solid #7a82c2;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 18px;
            font-weight: bold;
        }
        .upload-area {
            border: 2px dashed #7a82c2;
            background-color: #f8f9ff;
            padding: 40px 20px;
            border-radius: 10px;
            color: #888;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button {
            background-color: #adaed6;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover {
            background-color: #7a82c2;
        }
        .output-box {
            margin-top: 20px;
            background-color: #636ba9;
            color: white;
            padding: 15px;
            border-radius: 15px;
            min-height: 100px;
            text-align: left;
            font-size: 14px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Link to Text Converter</h2>
    
    <div class="input-group">
        <input type="text" placeholder="URL or Link">
    </div>

    <div class="upload-area" id="drop-zone">
        Tap, drag & drop, or paste <span style="background:#fff; padding: 2px 5px; border-radius: 3px;">video</span> here
        <input type="file" id="videoInput" accept="video/*" style="display: none;">
    </div>

    <button onclick="startConversion()">
        🔍 Convert
    </button>

    <div class="output-box" id="output">
        <small>Translate</small>
        <p id="resultText">এখানে আপনার সাবটাইটেল দেখা যাবে...</p>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const videoInput = document.getElementById('videoInput');
    const resultText = document.getElementById('resultText');

    dropZone.onclick = () => videoInput.click();

    function startConversion() {
        if (!videoInput.files[0]) {
            alert("অনুগ্রহ করে একটি ভিডিও ফাইল সিলেক্ট করুন।");
            return;
        }
        resultText.innerText = "প্রসেসিং হচ্ছে... (এটি একটি ডেমো, গিটহাব পেজে AI মডেলের জন্য API প্রয়োজন হয়)";
        // এখানে ভবিষ্যতে আপনি Whisper বা Speech SDK ইন্টিগ্রেট করতে পারেন।
    }
</script>

</body>
</html>
